<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Highway Escape</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial;
}

canvas {
  width:100vw;
  height:100vh;
  display:block;
}

/* CENTERED SCREENS */
#menu, #gameOver {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  color:white;
  z-index:10;
}

#gameOver { display:none; }

/* TEXT */
#menu h1, #gameOver h1 {
  font-size:60px;
}

#gameOver p {
  font-size:40px;
}

/* BUTTON */
button {
  padding:20px 40px;
  font-size:30px;
  margin-top:20px;
  cursor:pointer;
}

/* CONTROLS */
#controls {
  position:fixed;
  bottom:10px;
  width:100%;
  display:none;
  justify-content:center;
  gap:40px;
  z-index:10;
}

.btn {
  width:90px;
  height:90px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  color:white;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🏃 Highway Escape</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver">
  <h1>💀 Game Over</h1>
  <p id="scoreText"></p>
  <button onclick="restartGame()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- CONTROLS -->
<div id="controls">
  <div class="btn" id="leftBtn">⬅️</div>
  <div class="btn" id="forwardBtn">⬆️</div>
  <div class="btn" id="rightBtn">➡️</div>
</div>

<!-- SOUND -->
<audio id="engine" src="https://www.soundjay.com/transportation/sounds/car-driving-1.mp3" loop></audio>
<audio id="crash" src="https://www.soundjay.com/transportation/sounds/car-crash-1.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let W = canvas.width;
let H = canvas.height;

let gameRunning = false;
let score = 0;

// ✅ FIX: initialize immediately
let player = { x: W/2, y: H-180, size: 80 };
let chaser = { x: W/2, y: H-60, size: 80 };

let cars = [];
let spawnTimer = 0;

// CONTROLS
let left=false, right=false, forward=false;

function setupBtn(id, action){
  let btn = document.getElementById(id);
  btn.ontouchstart = ()=> action(true);
  btn.ontouchend = ()=> action(false);
}
setupBtn("leftBtn", v=>left=v);
setupBtn("rightBtn", v=>right=v);
setupBtn("forwardBtn", v=>forward=v);

// KEYBOARD
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
  if(e.key==="ArrowUp") forward=true;
});
document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
  if(e.key==="ArrowUp") forward=false;
});

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("gameOver").style.display="none";
  document.getElementById("controls").style.display="flex";

  // reset
  player.x = W/2;
  player.y = H-180;
  chaser.x = W/2;
  chaser.y = H-60;
  cars = [];
  score = 0;

  gameRunning=true;

  document.getElementById("engine").play();
  requestAnimationFrame(gameLoop);
}

function restartGame(){
  startGame();
}

function gameOver(){
  gameRunning=false;

  document.getElementById("engine").pause();
  document.getElementById("crash").play();
  document.getElementById("controls").style.display="none";

  document.getElementById("scoreText").innerText="Score: "+score;
  document.getElementById("gameOver").style.display="block";
}

// COLLISION
function collide(a,b){
  return a.x < b.x + b.w &&
         a.x + a.size > b.x &&
         a.y < b.y + b.h &&
         a.y + a.size > b.y;
}

// ROAD
let offset=0;
function drawRoad(){
  ctx.fillStyle="#555";
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle="white";
  ctx.lineWidth=6;

  offset+=8;

  for(let i=-40;i<H;i+=40){
    ctx.beginPath();
    ctx.moveTo(W/2, i + (offset%40));
    ctx.lineTo(W/2, i + 20 + (offset%40));
    ctx.stroke();
  }
}

// CAR
function drawCar(x,y){
  ctx.fillStyle="red";
  ctx.fillRect(x,y,80,120);

  ctx.fillStyle="lightblue";
  ctx.fillRect(x+10,y+20,60,30);

  ctx.fillStyle="black";
  ctx.fillRect(x+10,y+90,15,15);
  ctx.fillRect(x+55,y+90,15,15);
}

// LOOP
function gameLoop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,W,H);
  drawRoad();

  if(left && player.x>50) player.x-=8;
  if(right && player.x<W-100) player.x+=8;

  if(forward) player.y -= 4;
  else player.y += 2;

  ctx.font="70px Arial";
  ctx.fillText("🏃", player.x, player.y);

  if(chaser.x < player.x) chaser.x+=2;
  if(chaser.x > player.x) chaser.x-=2;

  chaser.y -= forward ? 2 : -1;

  ctx.fillText("👮", chaser.x, chaser.y);

  spawnTimer++;
  if(spawnTimer>40){
    let lanes=[W*0.2, W*0.5, W*0.75];
    let x=lanes[Math.floor(Math.random()*3)];
    cars.push({x:x,y:-120,w:80,h:120});
    spawnTimer=0;
  }

  for(let i=cars.length-1;i>=0;i--){
    let c=cars[i];
    c.y+=10;

    drawCar(c.x,c.y);

    if(collide(player,c)) gameOver();

    if(c.y>H){
      cars.splice(i,1);
      score++;
    }
  }

  if(Math.abs(player.x-chaser.x)<40 && Math.abs(player.y-chaser.y)<50){
    gameOver();
  }

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Score: "+score, 20, 50);

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
